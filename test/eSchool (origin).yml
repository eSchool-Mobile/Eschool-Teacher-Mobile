    - data:
        code: "function main({ raw_response }) {\n    try {\n        let data = raw_response;\n\
          \n        // Parse JSON jika string\n        if (typeof raw_response ===\
          \ 'string') {\n            try {\n                const parsed = JSON.parse(raw_response);\n\
          \                data = parsed.data || parsed;\n            } catch {\n\
          \                return { result: raw_response };\n            }\n     \
          \   }\n\n        const list = Array.isArray(data) ? data : [data];\n   \
          \     if (!list.length || typeof list[0] !== 'object') {\n            return\
          \ { result: \"Data kosong/tidak valid.\" };\n        }\n\n        // \U0001F525\
          \ Mapping ringkas tapi context tetap utuh\n        const mapped = list.map(item\
          \ => ({\n            id: item.id,\n            class_section_id: item.class_section_id,\n\
          \            class_subject_id: item.class_subject_id,\n            subject_id:\
          \ item.subject_id,\n\n            subject_name: item.subject?.name,\n  \
          \          subject_type: item.subject?.type,\n\n            class_name:\
          \ item.class_section?.class?.full_name,\n            section_name: item.class_section?.section?.name,\n\
          \            grade_level_id: item.class_section?.grade_level_id,\n     \
          \       medium: item.class_section?.medium?.name,\n\n            school_id:\
          \ item.school_id\n        }));\n\n        const headers = Object.keys(mapped[0]);\n\
          \n        const toCSV = (val) => {\n            if (val === null || val\
          \ === undefined) return '';\n            const s = String(val);\n      \
          \      if (s.includes('\"') || s.includes(',') || s.includes('\\n')) {\n\
          \                return `\"${s.replace(/\"/g, '\"\"')}\"`;\n           \
          \ }\n            return s;\n        };\n\n        const rows = [];\n   \
          \     rows.push(headers.join(','));\n\n        mapped.forEach(item => {\n\
          \            rows.push(headers.map(k => toCSV(item[k])).join(','));\n  \
          \      });\n\n        return { result: rows.join('\\n') };\n\n    } catch\
          \ (e) {\n        return { result: \"Error: \" + e.message };\n    }\n}\n"
        code_language: javascript
