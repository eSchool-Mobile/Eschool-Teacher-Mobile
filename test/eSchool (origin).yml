          \ => k.endpoint === urlapi);\n\n    if (!apiConfig) {\n      return {\n\
          \        full_url: \"\",\n        method: \"GET\",\n        error: \"Invalid\
          \ Endpoint from Intent\",\n      };\n    }\n\n    let url = \"https://esbeta.deanry.my.id\"\
          \ + apiConfig.endpoint;\n    let queryParams = [];\n\n    // Add params\
