          window:
            enabled: true
            size: 5
        model:
          completion_params: {}
          mode: chat
          name: openai/gpt-oss-20b
          provider: langgenius/groq/groq
        prompt_template:
        - id: system_prompt
          role: system
          text: "<context>{{#context#}}</context>\n<context>{{#1769397082402.result#}}</context>\n\
            <datetimenow>{{#1769054136524.text#}}</datetimenow>\nTugas Anda adalah\
            \ menganalisis input pengguna dan menentukan apakah input tersebut memerlukan\
            \ panggilan API berdasarkan konteks di atas.\n**Format Output:**\nAnda\
            \ WAJIB memberikan output HANYA dalam format JSON sebagai berikut:\n```json\n\
            {\n  \"isApi\": boolean,\n  \"urlapi\": \"string\",\n  \"params\": {\n\
                \"param_name\": \"param_value\"\n  },\n  \"msg\": \"string\"\n}\n\
            ```\n**Aturan Pengisian:**\n- `isApi`:\n  - `true` hanya jika input pengguna\
            \ berkaitan dengan API DAN semua parameter wajib (required params) berhasil\
            \ dideteksi.\n  - `false` jika tidak berkaitan dengan API, atau jika berkaitan\
            \ tapi parameter wajib tidak ditemukan.\n- `urlapi`: Isi dengan URL endpoint\
            \ API yang sesuai dari konteks. Jika tidak berkaitan sama sekali, isi\
            \ dengan \"unknown\".\n- `params`: Objek berisi parameter yang diekstrak.\n\
            - `msg`:\n  - Jika `isApi` = `true`: Kosongkan string `\"\"`.\n  - Jika\
            \ `isApi` = `false` tapi `urlapi` valid (parameter kurang): Isi dengan\
            \ pertanyaan spesifik untuk meminta parameter yang kurang (contoh: \"\
            Untuk tanggal berapa?\",\"Untuk kelas berapa?\",\"Untuk kelas apa?\")\n\
            **Contoh:**\nInput: \"Cek absensi hari ini\"\nOutput:\n```json\n{\n  \"\
            isApi\": true,\n  \"urlapi\": \"/api/teacher/get-attendance\",\n  \"params\"\
            : {\n         \"date\":\"2026-01-23\"\n   },\n  \"msg\": \"\"\n}\n```\n\
            Input: \"Cek absensi saya\"\n(Asumsi: get_attendance butuh param 'date')\n\
            Output:\n```json\n{\n  \"isApi\": false,\n  \"urlapi\": \"/api/teacher/get-attendance\"\
            ,\n  \"params\": {},\n  \"msg\": \"Untuk tanggal berapa Anda ingin mengecek\
            \ absensi?\"\n}\n```\nInput: \"Halo, apa kabar?\"\nOutput:\n```json\n\
            {\n  \"isApi\": false,\n  \"urlapi\": \"unknown\",\n  \"params\": {},\n\
              \"msg\": \"\"\n}\n```\nAturan Tambahan Penanganan Input di Luar Menu\
            \ (WAJIB DIPATUHI):\n\n- jika user coba meminta jadwal mengajar selain\
            \ hari itu / satu minggu tambahkan `?day={hari-yang-diminta}` untuk hari\
            \ lain selain hari ini dan `?all=true` untuk seminggu di params\n- Jika\
            \ input pengguna TIDAK berkaitan dengan fitur sistem eSchool\n  (jadwal,\
            \ mata pelajaran, kehadiran, tugas, ujian, pengumuman, hari libur):\n\n\
            \  - Set `isApi` = false\n  - Set `urlapi` = \"unknown\"\n  - Set `params`\
            \ = {}\n  - WAJIB isi `msg` dengan:\n    \"Silakan pilih menu fitur yang\
            \ tersedia untuk melanjutkan.\"\n\n- Aturan ini hanya berlaku jika input\
            \ pengguna benar-benar di luar konteks menu.\n- Jangan mengosongkan `msg`\
            \ pada kondisi ini.\n- Jangan menampilkan pesan error atau penjelasan\
            \ tambahan.\n```\n\nSekarang, proses input berikut ini."
        selected: false
        structured_output:
          schema:
            additionalProperties: false
            properties:
              isApi:
                description: if to answer user have to call api
                type: boolean
              msg:
                type: string
              params:
                description: list of params
                items:
                  additionalProperties: false
                  properties: {}
                  required: []
                  type: object
                type: array
              urlApi:
                description: url of api
                type: string
